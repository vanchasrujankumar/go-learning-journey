version: '3.9'

services:
  go-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: main
    container_name: go-learning-app
    ports:
      - "8080:8080"
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - .:/app
      - /app/vendor
    networks:
      - go-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: go-learning-postgres
    environment:
      POSTGRES_DB: go_learning
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - go-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: go-learning-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - go-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  go-network:
    driver: bridge
