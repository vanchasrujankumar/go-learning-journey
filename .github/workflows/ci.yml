name: Go CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      
      - name: Run tests in modules with go.mod
        run: |
          FAILED=0
          for dir in $(find . -name "go.mod" -exec dirname {} \;); do
            echo "=== Testing $dir ==="
            cd "$dir"
            if ! go test -v -race ./... 2>&1; then
              echo "FAILED: $dir"
              FAILED=1
            fi
            cd - > /dev/null
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "All tests passed!"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
          only-new-issues: true
          skip-pkg-cache: true

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      
      - name: Run gofmt
        run: |
          UNFORMATTED=$(gofmt -s -l . | grep -v ".git/" | wc -l | xargs)
          if [ "$UNFORMATTED" -gt 0 ]; then
            echo "Files not formatted ($UNFORMATTED):"
            gofmt -s -l .
            exit 1
          fi
          echo "All files are properly formatted."

  vet:
    name: Vet
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      
      - name: Run go vet on modules with go.mod
        run: |
          FAILED=0
          for dir in $(find . -name "go.mod" -exec dirname {} \;); do
            echo "=== Vetting $dir ==="
            cd "$dir"
            if ! go vet ./... 2>&1; then
              echo "VET FAILED: $dir"
              FAILED=1
            fi
            cd - > /dev/null
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "All vet checks passed!"
