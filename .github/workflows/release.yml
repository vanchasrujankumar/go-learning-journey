name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Run tests in modules with go.mod
        run: |
          FAILED=0
          for dir in $(find . -name "go.mod" -exec dirname {} \;); do
            echo "=== Testing $dir ==="
            cd "$dir"
            if ! go test -v -race ./... 2>&1; then
              echo "FAILED: $dir"
              FAILED=1
            fi
            cd - > /dev/null
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "All tests passed!"

      - name: Build all modules
        run: |
          mkdir -p dist
          cd 09-projects/06-production-rest-api
          GOOS=linux GOARCH=amd64 go build -o ../../dist/server-linux-amd64 ./cmd/server
          GOOS=darwin GOARCH=arm64 go build -o ../../dist/server-darwin-arm64 ./cmd/server
          GOOS=darwin GOARCH=amd64 go build -o ../../dist/server-darwin-amd64 ./cmd/server
          GOOS=windows GOARCH=amd64 go build -o ../../dist/server-windows-amd64.exe ./cmd/server

      - name: Generate release notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "RELEASE_NOTES=First release" >> $GITHUB_OUTPUT
          else
            git log $PREVIOUS_TAG..HEAD --oneline --no-merges > changelog.md
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
            cat changelog.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          body: |
            ## Release ${{ github.ref_name }}
            
            ### Changes
            ${{ steps.release_notes.outputs.RELEASE_NOTES }}
            
            ### Downloads
            - Linux (amd64): `server-linux-amd64`
            - macOS ARM64: `server-darwin-arm64`
            - macOS Intel: `server-darwin-amd64`
            - Windows: `server-windows-amd64.exe`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./09-projects/06-production-rest-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
