version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=development
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=go_api_db
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_USER_TOPIC=user-events
      - KAFKA_PRODUCT_TOPIC=product-events
      - JWT_SECRET=dev-secret-key-change-in-production
      - LOG_LEVEL=debug
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - api-network
    restart: unless-stopped

  mongo:
    image: mongo:6-alpine
    container_name: go-api-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: go_api_db
    volumes:
      - mongo_data:/data/db
    networks:
      - api-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: go-api-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    depends_on:
      - zookeeper
    networks:
      - api-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: go-api-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - api-network
    restart: unless-stopped

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: go-api-kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      - kafka
    networks:
      - api-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  api-network:
    driver: bridge
